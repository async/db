<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>@async/db Database Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #060914;
        --rail: #090f1d;
        --panel: #0d1424;
        --panel-2: #10192b;
        --panel-3: #131f34;
        --line: #22304a;
        --line-soft: #1a263c;
        --text: #e7eefc;
        --muted: #8d9ab3;
        --faint: #5d6b86;
        --accent: #3b82f6;
        --accent-2: #22c55e;
        --warning: #f59e0b;
        --danger: #fb7185;
        --radius: 8px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgb(59 130 246 / 16%), transparent 32rem),
          linear-gradient(135deg, #070b16 0%, #080b13 44%, #0a1020 100%);
        color: var(--text);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app-shell {
        display: grid;
        grid-template-columns: 52px 264px minmax(0, 1fr) 318px;
        height: 100vh;
        min-height: 640px;
        border: 1px solid rgb(148 163 184 / 15%);
        background: var(--bg);
      }

      .icon-rail {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 18px;
        border-right: 1px solid var(--line-soft);
        background: #070c18;
        padding: 12px 8px;
      }

      .brand {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 1px solid #203150;
        border-radius: 8px;
        background: linear-gradient(145deg, #13213b, #0a1326);
        color: #8bc6ff;
        font-weight: 800;
      }

      .rail-stack {
        display: grid;
        align-content: start;
        gap: 8px;
      }

      .rail-bottom {
        display: grid;
        gap: 8px;
      }

      .icon-button {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        color: #7484a4;
      }

      .icon-button[aria-current="true"],
      .icon-button:hover {
        border-color: #244c81;
        background: #0f2340;
        color: #dceaff;
      }

      .icon {
        width: 17px;
        height: 17px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.8;
      }

      .explorer {
        min-width: 0;
        border-right: 1px solid var(--line-soft);
        background: #09101f;
      }

      .explorer-header {
        display: grid;
        gap: 12px;
        padding: 14px;
        border-bottom: 1px solid var(--line-soft);
      }

      .eyeline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-width: 0;
      }

      .app-label {
        display: flex;
        align-items: center;
        gap: 7px;
        color: #aeb9ce;
        font-size: 0.75rem;
        font-weight: 700;
      }

      .tiny-actions {
        display: flex;
        gap: 5px;
      }

      .tiny-actions .icon-button {
        width: 27px;
        height: 27px;
        border-color: #1b2940;
        border-radius: 6px;
      }

      .connection-card {
        display: grid;
        gap: 10px;
        border: 1px solid #233450;
        border-radius: var(--radius);
        background: linear-gradient(180deg, #10192b, #0b1323);
        padding: 12px;
      }

      .connection-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.9rem;
        font-weight: 800;
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: fit-content;
        border: 1px solid rgb(34 197 94 / 25%);
        border-radius: 999px;
        background: rgb(34 197 94 / 10%);
        color: #8cf5b7;
        padding: 2px 8px;
        font-size: 0.68rem;
        font-weight: 800;
      }

      .status-chip::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: currentColor;
      }

      .muted-line {
        margin: 0;
        color: var(--muted);
        font-size: 0.74rem;
        line-height: 1.4;
      }

      .search {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        border: 1px solid #1f2d45;
        border-radius: 6px;
        background: #0b1322;
        padding: 8px 9px;
        color: #6d7b96;
      }

      .search input {
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font-size: 0.78rem;
      }

      .resource-list {
        padding: 12px 8px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 10px 6px 7px;
        color: #6f7f9d;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .resource-button {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        width: 100%;
        min-height: 36px;
        border: 1px solid transparent;
        border-radius: 6px;
        background: transparent;
        color: #b8c3d7;
        padding: 8px;
        text-align: left;
      }

      .resource-button:hover,
      .resource-button[aria-current="true"] {
        border-color: #21456f;
        background: #10213a;
        color: #f4f8ff;
      }

      .resource-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .resource-count {
        color: #72809b;
        font-size: 0.72rem;
        font-variant-numeric: tabular-nums;
      }

      .main {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        min-width: 0;
        background: #070b16;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 16px;
        border-bottom: 1px solid var(--line-soft);
        background: #0b1221;
        padding: 13px 18px;
      }

      .title-block {
        min-width: 0;
      }

      .title-row {
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        overflow: hidden;
        color: #f3f7ff;
        font-size: 1.02rem;
        font-weight: 800;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .breadcrumb {
        margin: 5px 0 0;
        color: #7f8da8;
        font-size: 0.73rem;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 34px;
        border: 1px solid #263852;
        border-radius: 6px;
        background: #111a2b;
        color: #d4ddf0;
        padding: 0 11px;
        font-size: 0.78rem;
        font-weight: 800;
        text-decoration: none;
      }

      .button:hover {
        border-color: #31517b;
        background: #14223a;
      }

      .button.primary {
        border-color: #1f7a4d;
        background: #16824c;
        color: white;
      }

      .tabs {
        display: flex;
        gap: 2px;
        border-bottom: 1px solid var(--line-soft);
        background: #08101d;
        padding: 0 14px;
      }

      .tab-button {
        min-height: 40px;
        border: 0;
        border-bottom: 2px solid transparent;
        background: transparent;
        color: #7d8ba5;
        padding: 0 13px;
        font-size: 0.78rem;
        font-weight: 800;
      }

      .tab-button:hover,
      .tab-button[aria-selected="true"] {
        border-bottom-color: #2d8cff;
        color: #f3f8ff;
      }

      .workspace {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        min-width: 0;
      }

      .query-panel {
        border-bottom: 1px solid var(--line-soft);
        background: #0b1220;
      }

      .query-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 9px 12px;
      }

      .preset-list {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .preset {
        border: 1px solid #253550;
        border-radius: 6px;
        background: #101a2d;
        color: #aeb9cd;
        padding: 6px 8px;
        font-size: 0.72rem;
        font-weight: 800;
      }

      .preset[aria-pressed="true"],
      .preset:hover {
        border-color: #2b68a8;
        background: #102947;
        color: #e4f1ff;
      }

      .query-editor {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        border-top: 1px solid #17243a;
        min-height: 112px;
      }

      .line-numbers {
        border-right: 1px solid #17243a;
        background: #080d18;
        color: #52627b;
        padding: 12px 10px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.76rem;
        line-height: 1.6;
        text-align: right;
        user-select: none;
      }

      textarea.sql {
        width: 100%;
        min-height: 112px;
        resize: none;
        border: 0;
        outline: 0;
        background: #0a1020;
        color: #cfe2ff;
        padding: 12px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.78rem;
        line-height: 1.6;
      }

      .content {
        min-height: 0;
        min-width: 0;
        overflow: auto;
        background:
          linear-gradient(rgb(255 255 255 / 2%), transparent 1px),
          #080d18;
        background-size: 100% 35px;
      }

      .panel-pad {
        padding: 14px;
      }

      .metric-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }

      .metric {
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        background: #0d1626;
        padding: 11px;
      }

      .metric span {
        display: block;
        color: #7d8ba6;
        font-size: 0.69rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        color: white;
        font-size: 1.05rem;
        font-variant-numeric: tabular-nums;
      }

      .data-frame {
        min-width: 720px;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        background: #0c1424;
        overflow: hidden;
      }

      .table-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line-soft);
        padding: 10px 12px;
      }

      .table-head h2 {
        margin: 0;
        font-size: 0.86rem;
      }

      .table-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.72rem;
      }

      .grid-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.78rem;
      }

      .grid-table th,
      .grid-table td {
        border-bottom: 1px solid #17243a;
        padding: 9px 10px;
        text-align: left;
        vertical-align: middle;
      }

      .grid-table th {
        background: #0a1120;
        color: #7e8da8;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .grid-table tr {
        color: #d8e2f3;
      }

      .grid-table tbody tr {
        cursor: pointer;
      }

      .grid-table tbody tr:hover,
      .grid-table tbody tr[aria-selected="true"] {
        background: #10233d;
      }

      .grid-table tbody tr[aria-selected="true"] {
        outline: 1px solid #235a91;
        outline-offset: -1px;
      }

      .cell-muted {
        color: #8290aa;
      }

      .value-chip {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        border-radius: 999px;
        background: #18263d;
        color: #c6d4ed;
        padding: 3px 8px;
        font-size: 0.7rem;
        font-weight: 800;
      }

      .value-chip[data-tone="paid"],
      .value-chip[data-tone="active"] {
        background: rgb(34 197 94 / 12%);
        color: #8bf0b5;
      }

      .value-chip[data-tone="pending"],
      .value-chip[data-tone="trial"] {
        background: rgb(245 158 11 / 13%);
        color: #ffd28a;
      }

      .value-chip[data-tone="refunded"],
      .value-chip[data-tone="paused"],
      .value-chip[data-tone="retired"] {
        background: rgb(251 113 133 / 13%);
        color: #ffadbc;
      }

      .schema-list,
      .activity-list {
        display: grid;
        gap: 10px;
      }

      .schema-card,
      .activity-card {
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        background: #0d1626;
        padding: 12px;
      }

      .schema-card h3,
      .activity-card h3 {
        margin: 0;
        color: #eef4ff;
        font-size: 0.84rem;
      }

      .field-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .field-row {
        border: 1px solid #1c2a42;
        border-radius: 6px;
        background: #0a1221;
        padding: 8px;
      }

      .field-row strong {
        display: block;
        color: #dce8fb;
        font-size: 0.76rem;
      }

      .field-row span {
        display: block;
        margin-top: 4px;
        color: #7888a4;
        font-size: 0.7rem;
      }

      .inspector {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        min-width: 0;
        border-left: 1px solid var(--line-soft);
        background: #0a111f;
      }

      .inspector-header {
        border-bottom: 1px solid var(--line-soft);
        padding: 14px;
      }

      .inspector-header h2 {
        margin: 0;
        font-size: 0.92rem;
      }

      .inspector-header p {
        margin: 5px 0 0;
        color: #7c8aa4;
        font-size: 0.72rem;
      }

      .record-summary {
        display: grid;
        gap: 8px;
        border-bottom: 1px solid var(--line-soft);
        padding: 14px;
      }

      .summary-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .summary-title strong {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.86rem;
      }

      .relation-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .relation-list span {
        border: 1px solid #26405f;
        border-radius: 999px;
        background: #0f2238;
        color: #b9d7ff;
        padding: 3px 8px;
        font-size: 0.68rem;
        font-weight: 800;
      }

      .record-fields {
        min-height: 0;
        overflow: auto;
        padding: 8px 14px 16px;
      }

      .kv-row {
        display: grid;
        grid-template-columns: 108px minmax(0, 1fr);
        gap: 12px;
        border-bottom: 1px solid #17243a;
        padding: 10px 0;
      }

      .kv-row dt {
        color: #6e7e99;
        font-size: 0.7rem;
        font-weight: 800;
      }

      .kv-row dd {
        margin: 0;
        min-width: 0;
        overflow-wrap: anywhere;
        color: #dce7f8;
        font-size: 0.76rem;
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: 300px;
        color: #73829d;
        text-align: center;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 1180px) {
        .app-shell {
          grid-template-columns: 52px 230px minmax(0, 1fr);
        }

        .inspector {
          display: none;
        }
      }

      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .app-shell {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
        }

        .icon-rail {
          display: none;
        }

        .explorer {
          border-right: 0;
          border-bottom: 1px solid var(--line-soft);
        }

        .resource-list {
          display: flex;
          gap: 8px;
          overflow-x: auto;
          padding: 10px;
        }

        .section-title {
          display: none;
        }

        .resource-button {
          min-width: 160px;
        }

        .topbar {
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: flex-start;
        }

        .metric-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .content {
          overflow-x: auto;
        }
      }

      @media (max-width: 520px) {
        .metric-row {
          grid-template-columns: 1fr;
        }

        .query-toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
    <script>
      window.DATABASE_DASHBOARD_BASE_PATH = "__BASE_PATH__";
      window.DATABASE_DASHBOARD_VERSION = "__APP_VERSION__";
    </script>
  </head>
  <body>
    <div class="app-shell">
      <nav class="icon-rail" aria-label="Primary">
        <div class="brand" aria-label="@async/db">db</div>
        <div class="rail-stack">
          <button class="icon-button" aria-current="true" aria-label="Database dashboard">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><ellipse cx="12" cy="5" rx="7" ry="3"></ellipse><path d="M5 5v6c0 1.7 3.1 3 7 3s7-1.3 7-3V5"></path><path d="M5 11v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"></path></svg>
          </button>
          <button class="icon-button" aria-label="Saved queries">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v16l-7-3-7 3z"></path></svg>
          </button>
          <button class="icon-button" aria-label="Activity">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h4l2-7 4 14 2-7h4"></path></svg>
          </button>
        </div>
        <div class="rail-bottom">
          <button class="icon-button" aria-label="Settings">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7.8 7.8 0 0 0-1.8-1L14.4 3h-4.8L9.3 6a7.8 7.8 0 0 0-1.8 1L5.1 6l-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.4-1a7.8 7.8 0 0 0 1.8 1l.3 3h4.8l.3-3a7.8 7.8 0 0 0 1.8-1l2.4 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"></path></svg>
          </button>
        </div>
      </nav>

      <aside class="explorer" aria-label="Database explorer">
        <div class="explorer-header">
          <div class="eyeline">
            <div class="app-label">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path></svg>
              Explorer
            </div>
            <div class="tiny-actions">
              <button class="icon-button" data-refresh aria-label="Refresh dashboard">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.3-5.7"></path><path d="M20 4v6h-6"></path></svg>
              </button>
            </div>
          </div>
          <div class="connection-card">
            <div class="connection-title">
              Commerce Demo
              <span class="status-chip">Open</span>
            </div>
            <p class="muted-line">Local file-backed @async/db resources with schema, REST, and viewer routes.</p>
          </div>
          <label class="search">
            <span class="sr-only">Filter rows</span>
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m16 16 4 4"></path></svg>
            <input data-search type="search" autocomplete="off" placeholder="Filter rows or fields...">
          </label>
        </div>
        <div class="resource-list" data-resources>
          <div class="section-title">Tables <span>0</span></div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="title-block">
            <div class="title-row">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h18"></path><path d="M3 12h18"></path><path d="M3 19h18"></path><path d="M8 5v14"></path></svg>
              <h1 data-title>Commerce Demo</h1>
            </div>
            <p class="breadcrumb" data-breadcrumb>Loading local resources...</p>
          </div>
          <div class="toolbar">
            <button class="button" data-refresh>
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.3-5.7"></path><path d="M20 4v6h-6"></path></svg>
              Refresh
            </button>
            <a class="button" href="__BASE_PATH__/__db">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4z"></path><path d="M4 10h16"></path><path d="M9 10v9"></path></svg>
              Built-in viewer
            </a>
          </div>
        </header>

        <nav class="tabs" aria-label="Dashboard views">
          <button class="tab-button" data-tab="data" aria-selected="true">Data</button>
          <button class="tab-button" data-tab="schema" aria-selected="false">Schema</button>
          <button class="tab-button" data-tab="query" aria-selected="false">Query</button>
          <button class="tab-button" data-tab="activity" aria-selected="false">Activity</button>
        </nav>

        <section class="workspace">
          <div class="query-panel">
            <div class="query-toolbar">
              <div class="preset-list" data-presets></div>
              <button class="button primary" data-run-query>
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
                Run
              </button>
            </div>
            <div class="query-editor">
              <div class="line-numbers">1<br>2<br>3</div>
              <textarea class="sql" data-sql spellcheck="false"></textarea>
            </div>
          </div>
          <div class="content" data-content>
            <div class="empty-state">Loading dashboard...</div>
          </div>
        </section>
      </main>

      <aside class="inspector" aria-label="Record inspector">
        <header class="inspector-header">
          <h2>Inspector</h2>
          <p data-inspector-context>Select a row to inspect fields and relations.</p>
        </header>
        <div class="record-summary" data-record-summary></div>
        <dl class="record-fields" data-record-fields></dl>
      </aside>
    </div>
    <script type="module" src="__BASE_PATH__/app.js"></script>
  </body>
</html>
