<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>@async/db Local Web App</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #f7f8fb;
        color: #1f2937;
      }

      main {
        box-sizing: border-box;
        display: grid;
        gap: 18px;
        margin: 0 auto;
        max-width: 760px;
        min-height: 100vh;
        padding: 32px 20px;
      }

      h1,
      p {
        margin: 0;
      }

      .panel {
        display: grid;
        gap: 14px;
        border: 1px solid #d7dce5;
        border-radius: 8px;
        background: #fff;
        padding: 18px;
        box-shadow: 0 1px 2px rgb(15 23 42 / 8%);
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.85rem;
        font-weight: 700;
      }

      input,
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #c8d0dc;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 180px;
        resize: vertical;
      }

      [data-status] {
        min-height: 24px;
        color: #475569;
      }

      [data-tone="saving"],
      [data-tone="typing"] {
        color: #8a5a00;
      }

      [data-tone="ok"] {
        color: #166534;
      }

      [data-tone="error"] {
        color: #b42318;
      }
    </style>
    <script>
      window.LOCAL_APP_BASE_PATH = "__BASE_PATH__";
      window.LOCAL_APP_VERSION = "__APP_VERSION__";
    </script>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>@async/db Local Web App</h1>
        <p>This page treats the loopback server as the source of truth and writes app state directly to <code>db/appState.json</code>.</p>
      </section>

      <section class="panel" aria-label="Local app state">
        <label>
          Title
          <input data-field="title" autocomplete="off">
        </label>
        <label>
          Note
          <textarea data-field="note"></textarea>
        </label>
        <p data-status>Loading...</p>
        <p data-saved-at></p>
      </section>
    </main>
    <script type="module" src="__BASE_PATH__/app.js"></script>
  </body>
</html>
